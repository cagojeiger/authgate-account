name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.css"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "postcss.config.mjs"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.css"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "postcss.config.mjs"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      # lib/env.ts asserts env presence at module-load, so build needs dummies.
      - name: next build
        run: npm run build
        env:
          AUTHGATE_ISSUER: https://example.com
          AUTHGATE_CLIENT_ID: dummy
          AUTHGATE_REDIRECT_URI: https://example.com/api/auth/callback
          SESSION_SECRET: dummy_session_secret_at_least_32_characters_long
