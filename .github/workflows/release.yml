name: Release

on:
  push:
    branches: [main]
    paths:
      - VERSION

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=v$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/cagojeiger/authgate-console:${{ steps.version.outputs.version }}
            ghcr.io/cagojeiger/authgate-console:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Delete old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: authgate-console
          package-type: container
          min-versions-to-keep: 20
          ignore-versions: "^latest$"
